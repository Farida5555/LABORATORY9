name: Build and Release

on:
  push:
    tags:
      -'v* #качан гана v1.0 сыяктуу тег колдонулганда иштейт

jobs:
  build-and-deploy:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout code
       uses: actions/checkout@v3

     - name: Create Artifact (Zip)
       run: |
        # Программанын жана логдорду архивге кошуу
        zip -r project-v1.zip main.py test.py app.log
     - name: Create Release
       uses: softprops/action-gh-release@v1
       with:
         files: project-v1.zip
       env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}